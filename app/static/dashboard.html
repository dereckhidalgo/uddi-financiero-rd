<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UDDI — Uso de Servicios</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 2rem 1rem; }
    .container { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
    h1 span { font-size: 13px; font-weight: 400; color: #888; margin-left: 8px; }

    .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem; align-items: flex-end; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 12px; color: #666; }
    .field input, .field select {
      height: 36px; padding: 0 10px;
      border: 1px solid #ddd; border-radius: 8px;
      background: #fff; color: #1a1a1a;
      font-size: 14px; min-width: 160px; outline: none;
    }
    .field input:focus, .field select:focus { border-color: #aaa; }
    .btn {
      height: 36px; padding: 0 16px;
      border: 1px solid #ddd; border-radius: 8px;
      background: #fff; color: #1a1a1a;
      font-size: 14px; cursor: pointer;
    }
    .btn:hover { background: #f0f0ee; }
    .btn.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .btn.primary:hover { opacity: 0.85; }

    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
    .metric { background: #fff; border-radius: 10px; border: 1px solid #eee; padding: 14px 16px; }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .metric-value { font-size: 22px; font-weight: 500; }
    .metric-value.sm { font-size: 14px; padding-top: 4px; }

    .table-wrap { background: #fff; border: 1px solid #eee; border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    thead { background: #fafaf8; }
    th { padding: 10px 14px; text-align: left; font-weight: 500; color: #888; font-size: 12px; border-bottom: 1px solid #eee; }
    td { padding: 10px 14px; border-bottom: 1px solid #f0f0ee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf8; }

    .badge { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 500; }
    .badge-tasa      { background: #E6F1FB; color: #0C447C; }
    .badge-inflacion { background: #EAF3DE; color: #27500A; }
    .badge-salud     { background: #FAEEDA; color: #633806; }
    .badge-historial { background: #FAECE7; color: #712B13; }
    .badge-clientes  { background: #EEEDFE; color: #3C3489; }
    .badge-uso       { background: #f0f0ee; color: #555; }
    .badge-default   { background: #f0f0ee; color: #555; }

    .empty { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; }
    .error-msg { color: #c0392b; font-size: 13px; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>UDDI — Uso de Servicios <span>últimos 100 registros</span></h1>

    <div class="filters">
      <div class="field">
        <label>Servicio</label>
        <select id="filterWs">
          <option value="">Todos</option>
          <option value="tasa-cambiaria">tasa-cambiaria</option>
          <option value="inflacion">inflacion</option>
          <option value="salud-financiera">salud-financiera</option>
          <option value="historial-crediticio">historial-crediticio</option>
          <option value="clientes">clientes</option>
          <option value="uso-servicios">uso-servicios</option>
        </select>
      </div>
      <div class="field">
        <label>Desde</label>
        <input type="date" id="filterFrom" />
      </div>
      <div class="field">
        <label>Hasta</label>
        <input type="date" id="filterTo" />
      </div>
      <button class="btn primary" onclick="fetchData()">Buscar</button>
      <button class="btn" onclick="clearFilters()">Limpiar</button>
    </div>

    <div id="errorMsg" class="error-msg" style="display:none;"></div>

    <div class="metrics">
      <div class="metric"><div class="metric-label">Total llamadas</div><div class="metric-value" id="mTotal">—</div></div>
      <div class="metric"><div class="metric-label">Servicios únicos</div><div class="metric-value" id="mServices">—</div></div>
      <div class="metric"><div class="metric-label">Más usado</div><div class="metric-value sm" id="mTop">—</div></div>
      <div class="metric"><div class="metric-label">Última llamada</div><div class="metric-value sm" id="mLast">—</div></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:40px;">#</th>
            <th style="width:28%;">Servicio</th>
            <th style="width:32%;">Parámetros</th>
            <th style="width:15%;">IP</th>
            <th style="width:25%;">Fecha</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5" class="empty">Presiona Buscar para cargar datos</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    function getBadge(ws) {
      if (!ws) return 'badge-default';
      if (ws.includes('tasa')) return 'badge-tasa';
      if (ws.includes('inflacion')) return 'badge-inflacion';
      if (ws.includes('salud')) return 'badge-salud';
      if (ws.includes('historial')) return 'badge-historial';
      if (ws.includes('clientes')) return 'badge-clientes';
      if (ws.includes('uso')) return 'badge-uso';
      return 'badge-default';
    }

    function formatDate(str) {
      if (!str) return '—';
      const d = new Date(str);
      return d.toLocaleString('es-DO', { month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function clearFilters() {
      document.getElementById('filterWs').value = '';
      document.getElementById('filterFrom').value = '';
      document.getElementById('filterTo').value = '';
      fetchData();
    }

    async function fetchData() {
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      const ws   = document.getElementById('filterWs').value;
      const from = document.getElementById('filterFrom').value;
      const to   = document.getElementById('filterTo').value;

      let url = '/api/v1/uso-servicios?';
      if (ws)   url += `nombre_ws=${ws}&`;
      if (from) url += `fecha_inicio=${from}&`;
      if (to)   url += `fecha_fin=${to}&`;

      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '<tr><td colspan="5" class="empty">Cargando...</td></tr>';

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const records = data.registros || [];

        document.getElementById('mTotal').textContent = data.total ?? 0;
        const unique = [...new Set(records.map(r => r.nombre_ws))].length;
        document.getElementById('mServices').textContent = unique;

        if (records.length > 0) {
          const freq = {};
          records.forEach(r => freq[r.nombre_ws] = (freq[r.nombre_ws] || 0) + 1);
          const top = Object.entries(freq).sort((a, b) => b[1] - a[1])[0];
          document.getElementById('mTop').textContent = top ? top[0] : '—';
          document.getElementById('mLast').textContent = formatDate(records[0].fecha_invocacion);
        } else {
          document.getElementById('mTop').textContent = '—';
          document.getElementById('mLast').textContent = '—';
        }

        if (records.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty">No se encontraron registros</td></tr>';
          return;
        }

        tbody.innerHTML = records.map((r, i) => `
          <tr>
            <td style="color:#aaa;">${i + 1}</td>
            <td><span class="badge ${getBadge(r.nombre_ws)}">${r.nombre_ws || '—'}</span></td>
            <td style="color:#666;">${r.parametros || '—'}</td>
            <td style="color:#666;">${r.ip_cliente || '—'}</td>
            <td style="color:#666;">${formatDate(r.fecha_invocacion)}</td>
          </tr>
        `).join('');
      } catch (e) {
        errEl.textContent = `Error al conectar con la API: ${e.message}`;
        errEl.style.display = 'block';
        tbody.innerHTML = '<tr><td colspan="5" class="empty">No se pudo cargar la información</td></tr>';
        document.getElementById('mTotal').textContent = '—';
        document.getElementById('mServices').textContent = '—';
        document.getElementById('mTop').textContent = '—';
        document.getElementById('mLast').textContent = '—';
      }
    }

    fetchData();
  </script>
</body>
</html>
